
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Bibliothèque Informatique</title>

    <style>

*{
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", Arial, sans-serif;

    background-image:
        linear-gradient(
            rgba(240,245,250,0.85),
            rgba(240,245,250,0.85)
        ),
        url("images/bibliotheque.jpg");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    margin:0;
    padding:40px;
    color:#2c3e50;
}


.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}


h1{
    text-align:center;
    color:#1f3c88;
    font-size:36px;
}


.description{
    text-align:center;
    font-size:18px;
    color:#555;
    margin-bottom:30px;
}


button{
    display:block;
    margin:25px auto;
    padding:14px 35px;
    font-size:18px;
    font-weight:bold;
    background:#3498db;
    color:white;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}


button:hover{
    background:#21618c;
    transform:scale(1.05);
}


/* Carte résultat backend */

#nombre{

    background:#e8f8f5;
    border-left:6px solid #16a085;

    padding:20px;

    margin:25px 0;

    border-radius:15px;

    font-size:20px;

    font-weight:bold;

    color:#117864;

}


/* Catalogue */

#catalogue{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

    gap:25px;

}


/* Carte livre */

.livre{

    background:white;

    padding:25px;

    border-radius:18px;

    border-top:6px solid #3498db;

    box-shadow:0 5px 15px rgba(0,0,0,0.12);

    transition:0.3s;

}


.livre:hover{

    transform:translateY(-8px);

    box-shadow:0 12px 25px rgba(0,0,0,0.18);

}


.livre h3{

    color:#2c3e50;

    margin-top:0;

    font-size:22px;

}


.livre p{

    color:#555;

    font-size:16px;

}


.api-card{

    background:#34495e;

    color:white;

    padding:20px;

    border-radius:15px;

    margin-top:30px;

}


</style>

</head>

<body>

<div class="container">

<h1>📚 Bibliothèque Informatique</h1>

<p>
Découvrez une sélection d'ouvrages de référence en développement logiciel,
réseaux, cybersécurité, algorithmique et électronique.
</p>

<button onclick="chargerCatalogue()">
Afficher le catalogue
</button>

<div id="nombre"></div>
<div class="api-card">
    ✅ Backend Django connecté<br>
    🔗 API : /api/hello/<br>
    ☸️ Déployé avec Kubernetes
</div>

<div id="catalogue"></div>

<script>

async function chargerCatalogue(){

    const reponse = await fetch("/api/hello/");

    const donnees = await reponse.json();


    document.getElementById("nombre").innerHTML =
        "Nombre de livres disponibles : " + donnees.nombre_livres;


    let html = "";

    donnees.livres.forEach(function(livre){

        html += `
            <div class="livre">

                <h3>📘 ${livre.titre}</h3>

                <p>
                    Auteur : ${livre.auteur}
                </p>

            </div>
        `;

    });


    document.getElementById("catalogue").innerHTML = html;

}

</script>
</div>
</body>

</html>
